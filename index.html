<style>
/* ===== BODY ===== */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    margin:0;
    padding:0;
}

/* ===== HEADER ===== */
header {
    position: sticky;
    top:0;
    background:#34495e;
    color:white;
    padding:12px 20px;
    display:flex;
    justify-content: space-between;
    align-items:center;
    z-index:1000;
}
header h1 {font-size:1.5rem; margin:0;}
#timer {font-weight:bold; font-size:1.2rem;}
#timer.urgent {color:#e74c3c; animation: blink 1s infinite;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0;}}

/* ===== CONTAINER ===== */
#questionsContainer {
    max-width:900px;
    margin:20px auto;
    padding:0 10px;
}

/* ===== CARD CÂU HỎI ===== */
.question-card {
    background: linear-gradient(145deg,#ffffff,#e8f0fe);
    margin-bottom:18px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    padding:15px 20px;
    transition: transform 0.3s, box-shadow 0.3s;
    display:flex;
    flex-direction:column;
}
.question-card:hover{
    transform: translateY(-4px);
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}
.question-text {
    font-weight:bold;
    margin-bottom:12px;
    font-size:1.1rem;
    text-align:justify;
}

/* ===== BUTTON ĐÁP ÁN ===== */
.answers button {
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:10px;
    width:100%;
    margin-bottom:8px;
    padding:12px 15px;
    border:none;
    border-radius:8px;
    background:#ecf0f1;
    cursor:pointer;
    font-size:1rem;
    text-align:left;
    transition: all 0.2s;
}
.answers button:hover {background:#d0d7de;}
.answers button.selected {background:#3498db; color:white;}
.answers button.correct {background:#2ecc71; color:white;}
.answers button.wrong {background:#e74c3c; color:white;}

/* ===== NỘP BÀI ===== */
#submitBtn {
    display:block;
    width:90%;
    max-width:400px;
    margin:20px auto;
    background: linear-gradient(45deg,#e74c3c,#c0392b);
    color:white;
    font-size:1.1rem;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:opacity 0.2s;
}
#submitBtn:hover {opacity:0.9;}

/* ===== KẾT QUẢ ===== */
#scoreDiv {
    max-width:900px;
    margin:20px auto;
    font-size:1.3rem;
    font-weight:bold;
    text-align:center;
    color:#34495e;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    header h1{font-size:1.3rem;}
    #timer{font-size:1.1rem;}
    .question-text{font-size:1rem;}
    .answers button{font-size:0.95rem;padding:10px;}
    #submitBtn{font-size:1.05rem;padding:10px;}
}
@media(max-width:480px){
    header h1{font-size:1.1rem;}
    #timer{font-size:1rem;}
    .question-text{font-size:0.95rem;}
    .answers button{font-size:0.9rem;padding:8px;}
    #submitBtn{font-size:1rem;padding:8px;}
}
</style>

// ===== CHỌN 50 CÂU NGẪU NHIÊN =====
const TOTAL_QUESTIONS = 50;
const questions = rawQuestions.sort(()=>0.5-Math.random()).slice(0,TOTAL_QUESTIONS);
const container = document.getElementById("questionsContainer");

// ===== HIỂN THỊ VỚI RANDOM ĐÁP ÁN =====
questions.forEach((q,i)=>{
    const card=document.createElement("div");
    card.className="question-card";

    // Random vị trí đáp án
    let answerIndexes = [0,1,2,3];
    answerIndexes.sort(()=>0.5-Math.random());
    q.shuffledAnswers = answerIndexes.map(idx=>q.answers[idx]);
    q.shuffledCorrect = answerIndexes.indexOf(q.correct);

    card.innerHTML=`<div class="question-text">Câu ${i+1}: ${q.q}</div><div class="answers"></div>`;
    const answersDiv = card.querySelector(".answers");
    q.shuffledAnswers.forEach((a,j)=>{
        const btn=document.createElement("button");
        btn.textContent=a;
        btn.addEventListener("click",()=>{
            answersDiv.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
            btn.classList.add("selected");
            q.userAnswer=j;
        });
        answersDiv.appendChild(btn);
    });
    container.appendChild(card);
});

// ===== ĐỒNG HỒ 45 PHÚT =====
let timeLeft=45*60;
const timerEl=document.getElementById("timer");
const timerInterval=setInterval(()=>{
    const min=Math.floor(timeLeft/60);
    const sec=timeLeft%60;
    timerEl.textContent=`${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    if(timeLeft<=5*60) timerEl.classList.add("urgent");
    if(timeLeft<=0){clearInterval(timerInterval);submitQuiz();}
    timeLeft--;
},1000);

// ===== NỘP BÀI =====
document.getElementById("submitBtn").addEventListener("click",submitQuiz);

function submitQuiz(){
    // Bắt buộc chọn tất cả câu
    const unanswered = questions.some(q=>q.userAnswer===undefined);
    if(unanswered){
        alert("Bạn phải chọn đáp án cho tất cả câu hỏi trước khi nộp!");
        return;
    }

    clearInterval(timerInterval);
    let correctCount=0;

    questions.forEach((q,i)=>{
        const btns = container.children[i].querySelectorAll("button");
        btns.forEach((btn,idx)=>{
            btn.disabled=true;
            if(idx===q.shuffledCorrect) btn.classList.add("correct");
            if(q.userAnswer===idx && q.userAnswer!==q.shuffledCorrect) btn.classList.add("wrong");
        });
        if(q.userAnswer===q.shuffledCorrect) correctCount++;
    });

    document.getElementById("scoreDiv").textContent=`Tổng điểm: ${correctCount} / ${TOTAL_QUESTIONS}`;
}
</script>
