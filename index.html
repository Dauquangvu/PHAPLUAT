// ======= LẤY NGẪU NHIÊN 50 CÂU =======
function getRandomQuestions(arr, n){
    const shuffled = arr.sort(()=>0.5-Math.random());
    return shuffled.slice(0,n);
}

const quizQuestions = getRandomQuestions(allQuestions, 50);

// ======= HIỂN THỊ CÂU HỎI =======
const quizDiv = document.getElementById("quiz");
quizQuestions.forEach((q,i)=>{
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<p><b>Câu ${i+1}:</b> ${q.question}</p>
                     <div class="options">
                     ${q.options.map(o=>`<label><input type="radio" name="q${i}" value="${o}"> ${o}</label>`).join('')}
                     </div>`;
    quizDiv.appendChild(div);
});

// ======= ĐẾM NGƯỢC 45 PHÚT =======
let timeLeft = 45*60; // 45 phút
const timerEl = document.getElementById("timer");
const timerInterval = setInterval(()=>{
    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;
    timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if(timeLeft<=0){
        clearInterval(timerInterval);
        alert("Hết giờ! Tự động nộp bài.");
        submitQuiz();
    }
    timeLeft--;
},1000);

// ======= NỘP BÀI & BÁO KẾT QUẢ =======
function submitQuiz(){
    clearInterval(timerInterval);
    let score=0;
    let wrongList=[];
    quizQuestions.forEach((q,i)=>{
        const selected = document.querySelector(`input[name=q${i}]:checked`);
        if(selected && selected.value===q.answer) score++;
        else wrongList.push(`Câu ${i+1}`);
    });
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = `<h2>Kết quả: ${score}/50</h2>
                           ${wrongList.length>0? `<p class="wrong">Sai: ${wrongList.join(", ")}</p>` : `<p class="correct">Tất cả đúng!</p>`}`;
}

document.getElementById("submitBtn").addEventListener("click", submitQuiz);
</script>
